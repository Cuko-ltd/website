<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Cuko">
  <title>Cuko mark</title>
  <desc>Square Cuko favicon mark — wordmark on ink fill, accent underscore.</desc>
  <style>
    .bg     { fill: #0a0a0a; }
    .ink    { fill: #f4f3ee; }
    .accent { fill: #1f4dff; }
    @media (prefers-color-scheme: dark) {
      .bg     { fill: #f4f3ee; }
      .ink    { fill: #0a0a0a; }
      .accent { fill: #1f4dff; }
    }
    text {
      font-family: 'JetBrains Mono', 'JetBrains Mono Variable', 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-weight: 700;
      letter-spacing: -0.04em;
    }
  </style>
  <rect class="bg" x="0" y="0" width="256" height="256" />
  <text x="128" y="156" font-size="86" text-anchor="middle">
    <tspan class="ink">Cuko</tspan><tspan class="accent">_</tspan>
  </text>
</svg>
